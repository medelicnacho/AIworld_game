<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gameworld</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13; }
      canvas { display: block; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #cfd6e4; text-shadow: 0 1px 2px #000a;
      }
      /* The dev/debug dump — demoted to a small, dim top-left block now that the real HUD
         (health, ammo, abilities) carries the important state Overwatch-style. */
      #stats { position: absolute; top: 8px; left: 10px; white-space: pre; opacity: .4;
        font-size: 10px; line-height: 1.35; max-width: 44vw; }
      /* --- Overwatch-style HUD: big health bottom-left, big ammo bottom-right --------- */
      #health { position: absolute; left: 34px; bottom: 30px; width: 300px;
        font: ui-sans-serif, system-ui, sans-serif; text-shadow: 0 2px 6px #000c; }
      #health .hp-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
      #health .hp-num { font-size: 40px; font-weight: 800; color: #eaf6ff; line-height: .9; }
      #health .hp-max { font-size: 16px; font-weight: 600; color: #9fb2cc; }
      #health .hp-arm { margin-left: auto; font-size: 13px; font-weight: 700; color: #8fd6ff;
        letter-spacing: .04em; }
      #health .hp-track { height: 15px; background: #0d1420cc; border: 2px solid #ffffff2e;
        border-radius: 3px; overflow: hidden;
        /* segment ticks, the Overwatch look */
        background-image: repeating-linear-gradient(90deg, transparent 0 30px, #0008 30px 32px);
        background-color: #0d1420cc; }
      #health .hp-fill { height: 100%; background: linear-gradient(#f4fbff, #cfe6ff);
        transition: width .12s linear; box-shadow: 0 0 10px #bfe0ff88; }
      #health.low .hp-fill { background: linear-gradient(#ff9a8a, #ff5a4a); box-shadow: 0 0 12px #ff5a4aaa; }
      #health.low .hp-num { color: #ff8a7a; }
      #ammo { position: absolute; right: 34px; bottom: 28px; text-align: right;
        font: ui-sans-serif, system-ui, sans-serif; text-shadow: 0 2px 6px #000c; }
      #ammo .am-name { font-size: 12px; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; color: #9fb2cc; margin-bottom: 2px; }
      #ammo .am-row { display: flex; align-items: baseline; justify-content: flex-end; gap: 6px; }
      #ammo .am-cur { font-size: 52px; font-weight: 800; color: #eaf6ff; line-height: .85; }
      #ammo .am-cur.low { color: #ffb454; }
      #ammo .am-max { font-size: 20px; font-weight: 600; color: #9fb2cc; }
      #ammo .am-reload { font-size: 30px; font-weight: 800; color: #ffb454; letter-spacing: .04em; }
      #ammo .am-stow { font-size: 22px; font-weight: 700; color: #7dffb5; letter-spacing: .04em; }
      #health .hp-lvl { font-size: 12px; font-weight: 800; letter-spacing: .16em; color: #ffe08a;
        margin-bottom: 3px; }
      /* XP bar — a long thin BLUE bar sitting directly on top of the ability bar. */
      #xp { position: absolute; left: 50%; transform: translateX(-50%); bottom: 94px;
        width: min(720px, 92vw); height: 6px; background: #0a1220cc;
        border: 1px solid #1c3050; border-radius: 4px; overflow: hidden; }
      #xp .xp-fill { height: 100%; background: linear-gradient(90deg, #2f8fff, #7fd0ff);
        box-shadow: 0 0 10px #4aa8ffbb; transition: width .25s linear; }
      #xp .xp-txt { position: absolute; right: 2px; bottom: 9px; font-size: 10px; font-weight: 700;
        letter-spacing: .1em; color: #9fccffcc; text-shadow: 0 2px 5px #000c; }
      #crosshair {
        position: absolute; left: 50%; top: 50%; width: 3px; height: 3px;
        margin: -1.5px 0 0 -1.5px; background: #eef; border-radius: 50%;
        box-shadow: 0 0 0 1px #0008; opacity: 0; transition: opacity .12s;
      }
      #minimap {
        position: absolute; top: 12px; right: 12px;
        width: 180px; height: 180px;
        filter: drop-shadow(0 2px 6px #0008);
      }
      #subtitle {
        position: absolute; left: 50%; bottom: 12%; transform: translateX(-50%);
        max-width: 60%; text-align: center; opacity: 0;
        font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; color: #eaf2ff;
        text-shadow: 0 2px 8px #000c; transition: opacity .25s;
      }
      #shop { position: absolute; inset: 0; display: none; place-content: center;
        pointer-events: auto; font: 13px/1.5 ui-sans-serif, system-ui, sans-serif; }
      body.shopping #shop { display: grid; }
      #shop .panel { width: min(560px, 88vw); background: #121722f2; color: #dfe8f5;
        border: 1px solid #2f3d55; border-radius: 10px; overflow: hidden;
        box-shadow: 0 18px 60px #000a; }
      #shop header { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
        background: #1a2233; border-bottom: 1px solid #2f3d55; }
      #shop h2 { margin: 0; font-size: 15px; letter-spacing: .04em; flex: 1; }
      #shop .gold { color: #ffd45e; font-weight: 600; }
      #shop .x { background: none; border: 0; color: #8fa3bf; font-size: 15px; cursor: pointer; }
      #shop .items { max-height: 52vh; overflow-y: auto; }
      #shop .item { display: grid; grid-template-columns: 1fr auto; gap: 2px 12px;
        width: 100%; text-align: left; padding: 11px 14px; background: none; border: 0;
        border-bottom: 1px solid #222c3e; color: inherit; cursor: pointer; font: inherit; }
      #shop .item:hover { background: #1c2739; }
      #shop .item.poor { opacity: .45; cursor: not-allowed; }
      #shop .nm { font-weight: 600; }
      #shop .nm em { color: #7fd4a0; font-style: normal; font-size: 11px; }
      #shop .ds { grid-column: 1; color: #93a6c0; font-size: 12px; }
      #shop .pr { grid-row: 1 / span 2; align-self: center; color: #ffd45e; font-weight: 600; }
      #shop .empty { padding: 18px 14px; color: #93a6c0; margin: 0; }
      #shop footer { padding: 9px 14px; background: #161d2b; color: #8fa3bf; font-size: 12px; }
      #shop .panel.wide { width: min(820px, 94vw); }
      #shop .cols { display: grid; grid-template-columns: 1fr 1fr; }
      #shop .col { min-width: 0; }
      #shop .col.sellcol { border-left: 1px solid #222c3e; background: #0e1420; }
      #shop .col h3 { margin: 0; padding: 10px 14px 4px; font-size: 11px; letter-spacing: .1em;
        color: #8fa3bf; text-transform: uppercase; }
      #shop .sellall { display: block; width: calc(100% - 28px); margin: 4px 14px 8px;
        background: #3a3550; border: 1px solid #5a4d7d; color: #d9cbff; border-radius: 6px;
        padding: 6px; cursor: pointer; font: inherit; font-size: 12px; }
      #shop .sellall.off { opacity: .4; cursor: default; }
      #shop .sellitems { max-height: 46vh; }
      #shop .sellitem { display: flex; justify-content: space-between; align-items: center;
        width: calc(100% - 20px); margin: 4px 10px; gap: 10px; background: #46536b55;
        border: 1px solid #6b7a95; border-radius: 6px; padding: 7px 10px; cursor: pointer;
        font: inherit; text-align: left; }
      #shop .sellitem:hover { background: #1c2739; }
      #shop .sellitem .nm { font-size: 12px; font-weight: 600; }
      #shop .sellitem .pr { color: #ffd45e; font-weight: 600; font-size: 12px; }
      @media (max-width: 640px) { #shop .cols { grid-template-columns: 1fr; }
        #shop .col.sellcol { border-left: 0; border-top: 1px solid #222c3e; } }
      body.shopping #click { display: none; }
      body.inv #click { display: none; }

      #inv { position: absolute; inset: 0; display: none; place-content: center;
        pointer-events: auto; font: 13px/1.5 ui-sans-serif, system-ui, sans-serif; }
      body.inv #inv { display: grid; }
      #inv .panel { width: min(620px, 90vw); background: #121722f2; color: #dfe8f5;
        border: 1px solid #2f3d55; border-radius: 10px; overflow: hidden;
        box-shadow: 0 18px 60px #000a; }
      #inv header { display: flex; align-items: center; padding: 12px 14px;
        background: #1a2233; border-bottom: 1px solid #2f3d55; }
      #inv h2 { margin: 0; font-size: 15px; letter-spacing: .04em; flex: 1; }
      #inv h3 { margin: 4px 14px 6px; font-size: 11px; letter-spacing: .1em;
        color: #8fa3bf; text-transform: uppercase; }
      #inv .x { background: none; border: 0; color: #8fa3bf; font-size: 15px; cursor: pointer; }
      #inv .bag, #inv .bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
      #inv .bar { border-top: 1px solid #222c3e; background: #0e1420; }
      #inv .cell { width: 72px; height: 76px; border-radius: 8px; background: #46536be6;
        border: 1px solid #6b7a95; display: grid; align-content: center; justify-items: center;
        gap: 2px; cursor: grab; user-select: none; }
      #inv .cell.blank { background: #2a344699; border-style: dashed; cursor: default; }
      #inv .cell.eq { border-color: #7dffb5; box-shadow: 0 0 10px #3ce88a44; }
      #inv .cell.held { border-color: #ffd45e; box-shadow: 0 0 12px #ffd45e66; }
      #inv .cell .ic { width: 30px; height: 30px; }
      #inv .cell .ic svg { width: 100%; height: 100%; display: block; }
      #inv .cell .nm { font-size: 9px; text-align: center; line-height: 1.15; color: #f0f5ff; }
      #inv .none { padding: 14px; color: #93a6c0; margin: 0; }
      #inv .adm { background: #26314a; border: 1px solid #3d4d6b; color: #9fb4d4;
        border-radius: 5px; padding: 3px 9px; margin-right: 8px; cursor: pointer;
        font: inherit; font-size: 11px; }
      #inv .adm.on { background: #6b4a12; border-color: #c99a3a; color: #ffd98a; }
      #inv .admin { padding: 10px 14px; background: #1d1a10;
        border-top: 1px solid #4a3c18; color: #e8d9b0; font-size: 12px; }
      #inv .admin .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      #inv .admin .give-row { margin-top: 8px; }
      #inv .admin .give { background: #2b3550; border: 1px solid #4a5a7d; }
      #inv .admin .lbl { color: #b3a887; margin-right: 2px; }
      #inv .admin .give.spawn { background: #4a2130; border-color: #8c4058; color: #ffc9d6; }
      #inv .admin .give.has { background: #1f3b2a; border-color: #4e8f66; color: #a8e8c2; }
      #inv .admin input { width: 70px; background: #0f1420; border: 1px solid #3d4d6b;
        color: #dfe8f5; border-radius: 4px; padding: 3px 6px; font: inherit; }
      #inv .admin button { background: #37425c; border: 1px solid #55668a;
        color: #dfe8f5; border-radius: 5px; padding: 4px 10px; cursor: pointer; font: inherit; }
      #inv footer { padding: 9px 14px; background: #161d2b; color: #8fa3bf; font-size: 12px; }
      #inv .panel { width: min(940px, 95vw); }
      #inv .tabs { display: flex; gap: 2px; padding: 0 10px; background: #1a2233;
        border-bottom: 1px solid #2f3d55; }
      #inv .tab { background: none; border: 0; color: #8fa3bf; cursor: pointer; font: inherit;
        font-size: 12px; letter-spacing: .05em; padding: 9px 16px; border-bottom: 2px solid transparent; }
      #inv .tab:hover { color: #cdd8ea; }
      #inv .tab.on { color: #ffe6a8; border-bottom-color: #ffce5e; }
      #inv .tabbody { min-height: 260px; }
      /* Three co-visible columns: equipped gear, live stats, bags — so a swap and its stat
         change are on screen together. */
      #inv .char { display: grid; grid-template-columns: 1.1fr 1fr 1.3fr; gap: 14px; padding: 14px;
        align-items: start; }
      #inv .char h3 { margin: 0 0 8px; }
      #inv .paperdoll { display: grid; grid-template-columns: 1fr; gap: 8px; align-content: start; }
      #inv .gslot { display: flex; justify-content: space-between; align-items: center;
        background: #46536be6; border: 1px solid #6b7a95; border-radius: 8px; padding: 10px 12px; }
      #inv .gslot.empty { background: #2a344699; border-style: dashed; }
      #inv .gslot .lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #9fb0cb; }
      #inv .gslot .val { font-size: 13px; color: #f0f5ff; font-weight: 600; }
      #inv .statcol { background: #0e1420; border: 1px solid #222c3e; border-radius: 8px;
        padding: 6px 12px; }
      #inv .strow { display: flex; justify-content: space-between; align-items: baseline;
        padding: 5px 0; font-size: 12px; color: #b9c6dc; }
      #inv .strow b { color: #f0f5ff; font-weight: 600; }
      #inv .strow em { color: #7f8fab; font-style: normal; font-size: 10px; }
      #inv .sthr { height: 1px; background: #222c3e; margin: 4px 0; }
      /* Bags: a real grid with room to grow, its own scroll if it fills up. */
      #inv .bagcol .bag { display: grid; grid-template-columns: repeat(auto-fill, 66px);
        gap: 8px; padding: 0; max-height: 300px; overflow-y: auto; align-content: start; }
      #inv .bagcol .cell { width: 66px; height: 70px; }
      #inv .talents { padding: 40px 14px; text-align: center; }
      #inv .legend { padding: 4px 14px 14px; border-top: 1px solid #222c3e; }
      #inv .legend h3 { margin: 10px 0 6px; }
      #inv .legend .leg { display: block; font-size: 11px; color: #93a6c0; padding: 2px 0; }
      #inv .legend .leg b { color: #cdd8ea; font-weight: 600; }
      .geartip { position: fixed; z-index: 50; width: 250px; pointer-events: none;
        background: #0d1220f5; border: 1px solid #2f3d55; border-radius: 8px; padding: 9px 11px;
        color: #dfe8f5; font: 12px/1.45 ui-sans-serif, system-ui, sans-serif;
        box-shadow: 0 10px 30px #000b; }
      .geartip .tt-name { font-weight: 600; font-size: 13px; }
      .geartip .tt-slot { color: #8fa3bf; font-size: 10px; letter-spacing: .08em;
        text-transform: uppercase; margin-bottom: 6px; }
      .geartip .tt-stats div { display: flex; justify-content: space-between; padding: 1px 0; }
      .geartip .tt-stats span { color: #9fb0cb; }
      .geartip .tt-stats b { color: #f0f5ff; font-weight: 600; }
      .geartip .tt-stats b.up { color: #6fe08a; }
      .geartip .tt-stats b.down { color: #ff7d7d; }
      .geartip .tt-cmp { margin: 7px 0 3px; padding-top: 6px; border-top: 1px solid #263149;
        color: #b9c6dc; font-size: 11px; }
      .geartip .tt-hint { color: #7f8fab; font-size: 10.5px; margin-top: 5px; }
      /* On a narrow window the three columns stack instead of squeezing. */
      @media (max-width: 720px) { #inv .char { grid-template-columns: 1fr; } }
      #points { position: absolute; left: 50%; bottom: 106px; transform: translateX(-50%);
        font: 600 15px/1 ui-monospace, SFMono-Regular, Menlo, monospace; color: #ffd45e;
        text-shadow: 0 2px 6px #000b; letter-spacing: .06em; }
      #points small { color: #b9c6da; font-weight: 400; font-size: 10px; letter-spacing: .12em; }
      #bar { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
        display: flex; gap: 8px; }
      #bar .sep { width: 1px; margin: 6px 6px; background: #33415a88; }
      /* Off cooldown is meant to be obvious at a glance mid-fight: bright border, lit face,
         a glow, and white lettering. On cooldown it drops right back to near-invisible so
         the difference is read peripherally rather than by looking. */
      #bar .slot { position: relative; width: 64px; height: 66px; border-radius: 8px;
        /* A LIGHT face, so the artwork sits on something instead of disappearing into
           the night sky behind it. State is carried by the border, the glow and the
           opacity — the background only has to make the icon legible. */
        background: #46536be6; border: 1px solid #6b7a95; overflow: hidden;
        display: grid; align-content: center; justify-items: center; gap: 1px;
        opacity: .62; transition: opacity .12s, box-shadow .12s, background .12s,
        border-color .12s; }
      #bar .slot .k { position: absolute; top: 2px; left: 5px; font-size: 10px; color: #dbe6f5; }
      #bar .slot .ch { position: absolute; bottom: 3px; font-size: 9px; color: #7fd4a0;
        letter-spacing: 1px; }
      #bar .slot .ic { display: block; width: 26px; height: 26px; margin-bottom: 1px;
        filter: drop-shadow(0 1px 2px #0009); }
      #bar .slot .ic svg { width: 100%; height: 100%; display: block; }
      #bar .slot.up .ic { filter: drop-shadow(0 0 5px #3ce88a88); }
      #bar .slot .n { font-size: 9px; letter-spacing: .03em; color: #f0f5ff; }
      /* The cooldown veil covers the whole slot, so it must be INVISIBLE when there is no
         cooldown — otherwise it sits on top of the icon permanently, which is exactly what
         was hiding the artwork. :empty is true whenever the countdown text is cleared. */
      #bar .slot .cool { position: absolute; inset: 0; background: #0a0f18a6;
        display: grid; place-content: center; font-size: 15px; color: #cfe0ff;
        font-weight: 600; text-shadow: 0 1px 3px #000; }
      #bar .slot .cool:empty { background: none; }
      /* READY = green and lit. ON COOLDOWN = dark and flat. One glance, two states. */
      #bar .slot.up { opacity: 1; background: #4e7f66ee; border-color: #7dffb5;
        box-shadow: 0 0 20px #3ce88a80, inset 0 0 14px #9dffc63a; }
      #bar .slot.up .n { color: #ddffe9; }
      #bar .slot.up .k { color: #8df5bb; }
      #bar .slot.up .ch { color: #9dffc6; }
      #bar .slot.empty { opacity: .32; border-style: dashed; box-shadow: none;
        background: #2a344699; }
      #plates { position: absolute; inset: 0; overflow: hidden; }
      #plates .plate { position: absolute; transform: translate(-50%, -100%);
        white-space: nowrap; text-align: center; pointer-events: none;
        font: 600 12px/1.25 ui-sans-serif, system-ui, sans-serif; color: #fff6dd;
        text-shadow: 0 1px 3px #000, 0 0 8px #0009; }
      #plates .plate span { display: block; font-weight: 400; font-size: 10px;
        color: #ffd45e; opacity: .9; }
      #hpbars { position: absolute; inset: 0; overflow: hidden; }
      #hpbars .hpbar { position: absolute; width: 34px; height: 4px;
        transform: translate(-50%, -100%); background: #0008; border: 1px solid #0009;
        border-radius: 2px; overflow: hidden; pointer-events: none; }
      #hpbars .hpbar i { display: block; height: 100%; background: #e2483d; }
      #hpbars .hpbar.elite { width: 46px; height: 5px; border-color: #7a5c12; }
      #hpbars .hpbar.elite i { background: #ffc84a; }
      #hurt {
        position: absolute; inset: 0; opacity: 0;
        background: radial-gradient(ellipse at center, #d0202000 45%, #e02a2acc 100%);
        transition: opacity .08s linear;
      }
      #click {
        position: absolute; inset: 0; display: grid; place-content: center;
        text-align: center; font-size: 14px; letter-spacing: .08em; color: #9fb0c8;
        background: #0b0e1366; backdrop-filter: blur(2px);
      }
      /* Keyed on RUNNING, not on pointer lock: after Escape closes a vendor the game is
         live again while the browser still refuses the mouse for a moment, and the pause
         panel must not reappear in that window. */
      body.running #click { display: none; }
      body.running #crosshair { opacity: .9; }
      #health, #ammo, #xp { opacity: 0; transition: opacity .2s; }
      body.running #health, body.running #ammo, body.running #xp { opacity: 1; }
      /* "Move outward" nudge — shows when your zone has greyed out (little/no xp). */
      #alert { position: absolute; left: 50%; top: 74px; transform: translateX(-50%);
        opacity: 0; transition: opacity .3s; pointer-events: none; text-align: center;
        font: 700 15px/1.4 ui-sans-serif, system-ui, sans-serif; color: #ffe08a;
        text-shadow: 0 2px 8px #000d; letter-spacing: .03em; }
      #alert.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="stats"></div>
      <div id="crosshair"></div>
      <div id="hurt"></div>
      <div id="subtitle"></div>
      <div id="points"></div>
      <div id="health"></div>
      <div id="ammo"></div>
      <div id="xp"></div>
      <div id="alert"></div>
      <div id="bar"></div>
      <div id="plates"></div>
      <div id="hpbars"></div>
      <canvas id="minimap" width="180" height="180"></canvas>
      <div id="click">CLICK TO PLAY &nbsp;·&nbsp; WASD move &nbsp; SPACE double-jump &nbsp; double-tap WASD dodge &nbsp; LMB fire &nbsp; RMB aim &nbsp; R reload &nbsp; F5 camera &nbsp; [ ] look &nbsp; M music &nbsp; G speak &nbsp; F trade &nbsp; C potion &nbsp; E firebomb &nbsp; Q heal &nbsp; C potion &nbsp; 1-6 T Tab spells &nbsp; wheel switch weapon</div>
    </div>
    <!-- Outside #hud on purpose: the HUD is pointer-events:none so it never eats clicks,
         and the shop is the one overlay that must receive them. -->
    <div id="shop"></div>
    <div id="inv"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

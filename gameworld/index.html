<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gameworld</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13; }
      canvas { display: block; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #cfd6e4; text-shadow: 0 1px 2px #000a;
      }
      #stats { position: absolute; top: 10px; left: 12px; white-space: pre; opacity: .85; }
      #crosshair {
        position: absolute; left: 50%; top: 50%; width: 3px; height: 3px;
        margin: -1.5px 0 0 -1.5px; background: #eef; border-radius: 50%;
        box-shadow: 0 0 0 1px #0008; opacity: 0; transition: opacity .12s;
      }
      #minimap {
        position: absolute; top: 12px; right: 12px;
        width: 180px; height: 180px;
        filter: drop-shadow(0 2px 6px #0008);
      }
      #subtitle {
        position: absolute; left: 50%; bottom: 12%; transform: translateX(-50%);
        max-width: 60%; text-align: center; opacity: 0;
        font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; color: #eaf2ff;
        text-shadow: 0 2px 8px #000c; transition: opacity .25s;
      }
      #hurt {
        position: absolute; inset: 0; opacity: 0;
        background: radial-gradient(ellipse at center, #d0202000 45%, #e02a2acc 100%);
        transition: opacity .08s linear;
      }
      #click {
        position: absolute; inset: 0; display: grid; place-content: center;
        text-align: center; font-size: 14px; letter-spacing: .08em; color: #9fb0c8;
        background: #0b0e1366; backdrop-filter: blur(2px);
      }
      body.locked #click { display: none; }
      body.locked #crosshair { opacity: .9; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="stats"></div>
      <div id="crosshair"></div>
      <div id="hurt"></div>
      <div id="subtitle"></div>
      <canvas id="minimap" width="180" height="180"></canvas>
      <div id="click">CLICK TO PLAY &nbsp;·&nbsp; WASD move &nbsp; SPACE double-jump &nbsp; double-tap WASD dodge &nbsp; LMB fire &nbsp; RMB aim &nbsp; R reload &nbsp; F5 camera &nbsp; [ ] look &nbsp; M music &nbsp; B summon boss &nbsp; G speak &nbsp; E grenade &nbsp; Q heal</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
